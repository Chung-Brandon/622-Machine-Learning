name: Deploy to shinyapps.io
on:
  push:
    branches: [ main ]
    paths:
      - 'shinyapp/**'
      
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Current stable version for shinyapps.io

      - name: Install Deployment Tool
        run: |
          pip install rsconnect-python shiny
          # Ensure any other dependencies are installed
          if [ -f shinyapp/requirements.txt ]; then pip install -r shinyapp/requirements.txt; fi

      - name: Deploy to shinyapps.io
        run: |
          # 1. Add your shinyapps.io account info using secrets
          rsconnect add \
            --account ${{ secrets.SHINYAPPS_ACCOUNT }} \
            --token ${{ secrets.SHINYAPPS_TOKEN }} \
            --secret ${{ secrets.SHINYAPPS_SECRET }} \
            --name my_shiny_account
          
          # 2. Deploy the specific folder
          rsconnect deploy shiny ./shinyapp \
            --name my_shiny_account \
            --title "heart-disease-risk-and-recommendations" \
            --requirements ./shinyapp/requirements.txt \
            --force-generate
